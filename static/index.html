<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Labeling - 图片标注系统</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2>图片列表</h2>
    <div id="label-filter"></div>
    <input id="search" type="text" placeholder="搜索图片...">
    <div id="img-list"></div>
    <div id="img-counter"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <button id="btn-folder" title="选择数据目录">📂 目录</button>
      <span class="sep"></span>
      <button id="btn-prev" title="上一张 (A)">◀ 上一张</button>
      <span id="img-name">请选择图片</span>
      <button id="btn-next" title="下一张 (D)">下一张 ▶</button>
      <span class="sep"></span>
      <button id="btn-rect" title="画矩形框 (R)" class="tool-btn">📦 矩形</button>
      <button id="btn-poly" title="画多边形 (P)" class="tool-btn">🔷 多边形</button>
      <button id="btn-select" title="选择模式 (V)" class="tool-btn active">🖱 选择</button>
      <span class="sep"></span>
      <button id="btn-delete" title="删除选中 (Del)">🗑 删除</button>
      <button id="btn-save" title="保存 (Ctrl+S)">💾 保存</button>
      <span class="sep"></span>
      <button id="btn-zoomin" title="放大 (+)">🔍+</button>
      <button id="btn-zoomout" title="缩小 (-)">🔍-</button>
      <button id="btn-fit" title="适应窗口 (F)">⊞ 适应</button>
      <span class="sep"></span>
      <span id="img-resolution"></span>
    </div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <div id="right-panel">
    <h3>标注列表</h3>
    <div id="shape-list"></div>
    <div id="shape-editor" style="display:none">
      <h4>编辑标注</h4>
      <label>标签: <input id="edit-label" type="text" list="label-suggestions"></label>
      <datalist id="label-suggestions"></datalist>
      <label>group_id: <input id="edit-group" type="text"></label>
      <div id="edit-flags"></div>
    </div>
  </div>
</div>
<!-- Label dialog -->
<div id="label-dialog" style="display:none">
  <div class="dialog-bg"></div>
  <div class="dialog-box">
    <h3>输入标签</h3>
    <input id="dialog-label" type="text" list="label-suggestions" placeholder="标签名称" autofocus>
    <div class="dialog-btns">
      <button id="dialog-ok">确定</button>
      <button id="dialog-cancel">取消</button>
    </div>
  </div>
</div>
<!-- Folder browser dialog -->
<div id="folder-dialog" style="display:none">
  <div class="dialog-bg"></div>
  <div class="dialog-box folder-dialog-box">
    <h3>选择数据目录</h3>
    <div class="folder-path-row">
      <input id="folder-path-input" type="text" placeholder="图片目录路径">
      <button id="folder-go">浏览</button>
    </div>
    <div id="folder-list"></div>
    <div class="folder-section">
      <label class="folder-label">标注目录（留空则与图片目录相同）:</label>
      <div class="folder-path-row">
        <input id="folder-label-input" type="text" placeholder="标注文件目录路径">
        <button id="folder-label-go">浏览</button>
      </div>
      <div id="folder-label-list"></div>
    </div>
    <div class="folder-section">
      <label class="folder-label">标注格式:</label>
      <select id="folder-format">
        <option value="auto">自动检测</option>
        <option value="json">X-AnyLabeling (JSON)</option>
        <option value="voc">VOC (XML)</option>
        <option value="coco">COCO (JSON)</option>
        <option value="yolo">YOLO (TXT)</option>
      </select>
    </div>
    <div class="dialog-btns">
      <button id="folder-select">确定</button>
      <button id="folder-cancel">取消</button>
    </div>
  </div>
</div>
<script src="/static/labeler.js"></script>
</body>
</html>
